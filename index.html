<script>
// 起動画面：アプリ初期化後に少し見せてフェードアウト
(function(){
  var sp=document.getElementById("splash");
  if(!sp)return;
  var hide=function(){ sp.classList.add("hide"); setTimeout(function(){ if(sp&&sp.parentNode) sp.parentNode.removeChild(sp); }, 650); };
  // 最低1.1秒は見せる（速すぎるとチラ見えで安っぽい）。読み込み済みでも一定時間表示。
  setTimeout(hide, 1100);
})();
</script>
<script>
// ───── Service Worker 登録＋自動更新（強制リロード不要化）─────
// 仕組み：新しいSWが有効化(controllerchange)されたら、その瞬間に1回だけ自動リロード。
//         これにより「Chrome/iPhoneで古い画面が出る→手動で強制リロード」を解消する。
if ("serviceWorker" in navigator) {
  let refreshing = false;
  // 新SWが操作権を取得した瞬間に1回だけリロード
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // 登録直後に一度だけ更新チェック（古いSWが居座る端末を即・新版へ）
      reg.update().catch(() => {});
      // 既に待機中の新SWがあれば即適用
      if (reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
      // 更新が見つかったら、インストール完了後に即アクティベートを促す
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("SKIP_WAITING");
          }
        });
      });
      // タブにフォーカスが戻るたびに更新チェック（モバイルでアプリ復帰時に効く）
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") reg.update().catch(() => {});
      });
    }).catch(() => {});
  });
}
</script>
