<script>
// ───── 起動画面 → アクセスコード（社内利用の人除け）─────
// 注意：これはURLを知っただけの第三者が使えないようにする簡易ロックです。
//       ブラウザで動く以上、開発者ツールでコードは読めます（強固な保護ではありません）。
//       本来のロジック保護は利用規約・著作権表示（法的牽制）またはサーバー化で行います。
(function(){
  var SALT="BimGen::gate::v1";
  // ▼ここに「設定したいアクセスコードのSHA-256ハッシュ」を入れてください。
  //   仮コード "bimgen2026" のハッシュを既定にしています。必ず自分のコードに差し替えを。
  var PW_HASH="a3b3d6278c72ae658c0d2fbe00d7f8e8711dfcb61664556294e51a76d7988397";
  var REMEMBER_DAYS=14;            // 一度入室したら何日間は再入力不要にするか
  var KEY="bimgen_gate_ok";

  var splash=document.getElementById("splash");
  var gate=document.getElementById("gate");

  function sha(s){ return CryptoJS.SHA256(SALT+s).toString(); }
  function alreadyOK(){
    try{
      var raw=localStorage.getItem(KEY); if(!raw)return false;
      var o=JSON.parse(raw);
      return o && o.h===PW_HASH && o.exp>Date.now();   // 同じコード&期限内なら通す
    }catch(_){ return false; }
  }
  function remember(){
    try{ localStorage.setItem(KEY, JSON.stringify({h:PW_HASH, exp:Date.now()+REMEMBER_DAYS*864e5})); }catch(_){}
  }
  function showApp(){ if(gate){gate.style.display="none";} }
  function showGate(){
    if(!gate)return;
    gate.style.display="flex";
    var inp=document.getElementById("gate-pw"),
        btn=document.getElementById("gate-btn"),
        err=document.getElementById("gate-err");
    var tries=0;
    function tryUnlock(){
      var v=(inp.value||"").trim();
      if(!v){ inp.focus(); return; }
      if(sha(v)===PW_HASH){ remember(); gate.classList.add("hide"); setTimeout(showApp,400); }
      else{
        tries++; err.textContent="アクセスコードが違います。"+(tries>=3?"（社内の管理者にご確認ください）":"");
        inp.value=""; inp.focus();
        gate.querySelector(".gate-card").classList.remove("shake"); void gate.offsetWidth;
        gate.querySelector(".gate-card").classList.add("shake");
      }
    }
    btn.addEventListener("click", tryUnlock);
    inp.addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(); });
    setTimeout(function(){ inp.focus(); }, 100);
  }

  // スプラッシュを少し見せてから、認証状態に応じてゲート or 本体へ
  setTimeout(function(){
    if(splash){ splash.classList.add("hide"); setTimeout(function(){ if(splash&&splash.parentNode) splash.parentNode.removeChild(splash); }, 650); }
    if(alreadyOK()){ showApp(); }   // 期限内：そのまま使える
    else { showGate(); }            // 未認証：コード入力
  }, 1100);
})();
</script>
<script>
// ───── Service Worker 登録＋自動更新（強制リロード不要化）─────
// 仕組み：新しいSWが有効化(controllerchange)されたら、その瞬間に1回だけ自動リロード。
//         これにより「Chrome/iPhoneで古い画面が出る→手動で強制リロード」を解消する。
if ("serviceWorker" in navigator) {
  let refreshing = false;
  // 新SWが操作権を取得した瞬間に1回だけリロード
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // 登録直後に一度だけ更新チェック（古いSWが居座る端末を即・新版へ）
      reg.update().catch(() => {});
      // 既に待機中の新SWがあれば即適用
      if (reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
      // 更新が見つかったら、インストール完了後に即アクティベートを促す
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("SKIP_WAITING");
          }
        });
      });
      // タブにフォーカスが戻るたびに更新チェック（モバイルでアプリ復帰時に効く）
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") reg.update().catch(() => {});
      });
    }).catch(() => {});
  });
}
</script>
